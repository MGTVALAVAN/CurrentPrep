# GitHub Actions Workflow: Daily Content Pipeline
#
# Runs the entire ePaper pipeline LOCALLY inside the runner
# (not via Vercel API calls) to avoid serverless timeout limits.
#
# Flow:
#   1. Checkout repo & install dependencies
#   2. Build the Next.js production bundle
#   3. Start the production server on localhost:3000
#   4. Hit /api/current-affairs/update (scrape + AI categorize)
#   5. Hit /api/epaper/generate (scrape + AI process + generate PDF + send email)
#   6. Commit the generated JSON data files back to the repo
#
# Schedule: 00:00 UTC = 05:30 AM IST daily
#
# Required secrets:
#   - GEMINI_API_KEY       : Google Gemini API key for AI processing
#   - CRON_SECRET          : Shared secret for API auth
#   - SMTP_USER            : Gmail address for sending ePaper email
#   - SMTP_PASS            : Gmail App Password
#   - APP_URL              : Production URL (for reference only)

name: Daily Content Pipeline

on:
  schedule:
    # 00:00 UTC = 05:30 AM IST — start the daily pipeline
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies (including devDependencies for Puppeteer)
        run: npm ci

      - name: 🔨 Build Next.js production bundle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

      - name: 🚀 Start production server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: |
          npm start &
          echo "Waiting for server to start..."
          # Wait until the server is responsive
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -qE "200|307"; then
              echo "✅ Server is ready!"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done

      - name: 📰 Step 1 — Scrape & Categorize Current Affairs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "🕐 Step 1: Triggering current affairs update at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "http://localhost:3000/api/current-affairs/update" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 600)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "⚠️ Current affairs update returned $HTTP_CODE — continuing to ePaper generation"
          else
            echo "✅ Current affairs updated successfully!"
          fi

      - name: ⏳ Wait for AI rate limits to cool
        run: |
          echo "Waiting 30 seconds before ePaper generation..."
          sleep 30

      - name: 📰 Step 2 — Generate Daily ePaper + Send Email
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "🕐 Step 2: Generating daily ePaper at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "http://localhost:3000/api/epaper/generate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 900)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ ePaper generation failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Daily ePaper generated successfully!"

          # Give the mailer async task time to generate PDF & send email
          echo "⏳ Waiting 120s for PDF generation + email delivery..."
          sleep 120

      - name: 📤 Commit & push generated data
        run: |
          git config user.name "CurrentPrep Bot"
          git config user.email "bot@currentprep.vercel.app"

          # Add only the data directories
          git add src/data/current-affairs/ src/data/epaper/ || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No new data files to commit"
          else
            TODAY=$(date -u '+%Y-%m-%d')
            git commit -m "📰 chore: daily ePaper & current affairs — ${TODAY} [skip ci]"
            git push
            echo "✅ Data committed and pushed to repository"
          fi
